steps:
# ขั้นตอนที่ 1: รันคำสั่งทดสอบ (ตัวอย่างเช่น go test)
- name: 'golang:1.25' # เปลี่ยนเวอร์ชันตามที่คุณใช้
  args: ['go', 'test', './...']

# ขั้นตอนที่ 2: Deploy ไปยัง App Engine
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  args: ['app', 'deploy', 'app.yaml', '--project=$PROJECT_ID', '--quiet']

# เพิ่ม Options เพื่อแก้ปัญหา Service Account Logging
options:
  logging: CLOUD_LOGGING_ONLY
