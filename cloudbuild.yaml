substitutions:
  _RESUME_BUCKET_NAME: 'my-resume-for-download'

steps:
# ขั้นตอนที่ 1: อัปโหลด resume ขึ้น GCS
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e
      RESUME_FILE=$$(ls file/*.pdf | head -n 1)
      if [ -z "$$RESUME_FILE" ]; then
        echo "Error: No PDF found in ./file/"
        exit 1
      fi
      echo "Found resume: $$RESUME_FILE"
      gsutil -m rm gs://${_RESUME_BUCKET_NAME}/*.pdf 2>/dev/null || echo "No old files"
      gsutil cp "$$RESUME_FILE" gs://${_RESUME_BUCKET_NAME}/
      gsutil acl ch -u AllUsers:R gs://${_RESUME_BUCKET_NAME}/$$(basename "$$RESUME_FILE")
      echo "Resume uploaded!"

# ขั้นตอนที่ 2: Deploy ขึ้น App Engine
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args: ['app', 'deploy', 'app.yaml', '--quiet']

options:
  logging: CLOUD_LOGGING_ONLY